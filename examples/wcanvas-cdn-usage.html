<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ThorVG WebCanvas - CDN Usage Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }
        #canvas {
            border: 1px solid #333;
            background: white;
            margin: 20px 0;
        }
        .controls {
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .info {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .playback-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        #timeline {
            flex: 1;
            min-width: 300px;
        }
        .frame-info {
            display: inline-block;
            min-width: 200px;
            font-family: monospace;
        }
        .loop-control {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <h1>ThorVG WebCanvas - CDN Usage Example</h1>

    <div class="info">
        <h3>About this example:</h3>
        <p>
            This example loads <code>@thorvg/webcanvas</code> entirely from a CDN (unpkg).<br>
            No <code>locateFile</code> is needed &mdash; the WASM binary is automatically fetched from the CDN.
        </p>
    </div>

    <div class="controls">
        <label>Renderer:
            <select id="backend">
                <option value="gl">WebGL</option>
                <option value="sw">Software</option>
                <option value="wg">WebGPU</option>
            </select>
        </label>
        <button onclick="init()">Initialize</button>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="playback-controls">
        <button id="playBtn" onclick="playPause()">&#9654; Play</button>
        <button onclick="stop()">&#9632; Stop</button>
        <input type="range" id="timeline" min="0" max="100" value="0" oninput="seekFrame(this.value)">
        <span class="frame-info" id="frameInfo">0.0 / 0 (0.00s)</span>
        <label class="loop-control">
            <input type="checkbox" id="loopCheckbox" checked onchange="toggleLoop()">
            Loop
        </label>
    </div>

    <div class="info">
        <h3>Status:</h3>
        <pre id="log"></pre>
    </div>

    <!-- Load @thorvg/webcanvas from CDN -->
    <script type="module">
        import ThorVG from 'https://unpkg.com/@thorvg/webcanvas@latest/dist/webcanvas.esm.js';

        let TVG;
        let canvas;
        let animation;

        const LOTTIE_URL = 'https://raw.githubusercontent.com/thorvg/thorvg.web/refs/heads/main/examples/resources/5344-honey-sack-hud.json';

        function log(msg) {
            const logEl = document.getElementById('log');
            logEl.textContent += msg + '\n';
            console.log(msg);
        }

        function updateFrameInfo() {
            if (!animation) return;

            const info = animation.info();
            const frame = animation.frame();
            const time = animation.getCurrentTime();

            document.getElementById('frameInfo').textContent =
                `${frame.toFixed(1)} / ${info.totalFrames.toFixed(0)} (${time.toFixed(2)}s)`;
            document.getElementById('timeline').value = frame;
        }

        window.init = async function() {
            const renderer = document.getElementById('backend').value;
            log(`Initializing ThorVG with ${renderer} renderer...`);

            try {
                // No locateFile needed - WASM is auto-fetched from CDN
                TVG = await ThorVG.init({ renderer });

                canvas = new TVG.Canvas('#canvas', {
                    renderer,
                    width: 800,
                    height: 600
                });

                log('ThorVG initialized successfully!');
                await loadAnimation();
            } catch (error) {
                log('ERROR: ' + error.message);
                console.error(error);
            }
        };

        async function loadAnimation() {
            log(`Fetching Lottie from URL...`);

            try {
                const response = await fetch(LOTTIE_URL);
                const data = new Uint8Array(await response.arrayBuffer());

                animation = new TVG.Animation();
                animation.load(data);

                const info = animation.info();
                log(`Loaded: ${info.totalFrames.toFixed(0)} frames, ${info.duration.toFixed(2)}s, ${info.fps.toFixed(0)} FPS`);

                const picture = animation.picture;
                const originalSize = picture.size();
                const scale = Math.min(800 / originalSize.width, 600 / originalSize.height);
                const w = originalSize.width * scale;
                const h = originalSize.height * scale;

                picture.size(w, h).translate((800 - w) / 2, (600 - h) / 2);
                canvas.add(picture);
                canvas.update();
                canvas.render();

                document.getElementById('timeline').max = info.totalFrames - 1;
                document.getElementById('timeline').value = 0;
                updateFrameInfo();

                log('Ready to play!');
            } catch (error) {
                log('ERROR: ' + error.message);
                console.error(error);
            }
        }

        window.playPause = function() {
            if (!animation) { log('No animation loaded'); return; }

            const btn = document.getElementById('playBtn');
            if (animation.isPlaying()) {
                animation.pause();
                btn.innerHTML = '&#9654; Play';
            } else {
                animation.play(() => {
                    canvas.update();
                    canvas.render();
                    updateFrameInfo();
                });
                btn.innerHTML = '&#9646;&#9646; Pause';
            }
        };

        window.stop = function() {
            if (!animation) return;
            animation.stop();
            canvas.update();
            canvas.render();
            updateFrameInfo();
            document.getElementById('playBtn').innerHTML = '&#9654; Play';
        };

        window.seekFrame = function(value) {
            if (!animation) return;
            animation.pause();
            animation.frame(parseFloat(value));
            canvas.update();
            canvas.render();
            updateFrameInfo();
            document.getElementById('playBtn').innerHTML = '&#9654; Play';
        };

        window.toggleLoop = function() {
            if (!animation) return;
            const loop = document.getElementById('loopCheckbox').checked;
            animation.setLoop(loop);
            log(`Loop ${loop ? 'enabled' : 'disabled'}`);
        };

        log('Ready! Click "Initialize" to start.');
    </script>
</body>
</html>
