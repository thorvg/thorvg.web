name: Cross-Framework Build Test

on:
  push:
    branches:
      - main
      - master
      - test/cross-framework-build # ✅ test 브랜치 푸시 시 실행
  pull_request:
    branches:
      - main
      - master # ✅ test → main/master PR 시 실행
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build ThorVG WASM
        run: npm run build

      - name: Run cross-framework tests
        run: npm run test:builds
