name: Deploy Playground (Manual)
on:
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PLAYGROUND_PROJECT_ID }}

jobs:
  deploy-playground:
    name: Deploy Playground to Production
    runs-on: ubuntu-latest
    environment:
      name: playground-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install Playground dependencies
        working-directory: ./playground
        run: |
          yarn install --frozen-lockfile
          yarn add @thorvg/webcanvas@latest

      - name: Pull Vercel Environment Information
        working-directory: ./playground
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Playground
        working-directory: ./playground
        run: |
          yarn build
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        id: deploy
        working-directory: ./playground
        run: echo "url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "### Playground deployed" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
