<!DOCTYPE html>
<html>
<head>
  <title>Emscripten</title>
  <!-- <script type="module" src="./thorvg-wasm.js"></script> -->
</head>
<body>
  <div>WebGPU web player</div>
  <canvas id="thorvg-canvas" width="3000" height="3000">Hello</canvas>
  <script type="module">
    import Module from '../dist/thorvg-wasm.js';
    let animator = null;
    let totalFrames = 0.0;
    let duration = 0.0;

    async function render(timestamp) {
      await animator.frame((timestamp / (duration * 1000) % 1) * totalFrames);
      await animator.update();
      await animator.render();
      window.requestAnimationFrame(render);
    }

    window.onload = async () => {
      // create thorvg module
      const module = await Module();
      // create animator
      animator = new module.TvgLottieAnimation();
      await animator.resize(500, 500);
      // load animation from file and get data
      let jsonFile = await (await fetch('./threads.json')).text();
      await animator.load(jsonFile, "json", 500, 500, '');
      totalFrames = await animator.totalFrame();
      duration = await animator.duration();
      // request animation
      window.requestAnimationFrame(render);
    }
    window.onclose = () => animator.delete();
  </script>
  <script src="https://mrdoob.github.io/stats.js/build/stats.min.js"></script>
  <script>
    var statsFPS = new Stats();
    statsFPS.showPanel(0); // 0: fps
    statsFPS.dom.style.cssText =
      "position:fixed;top:0;left:0;cursor:pointer;opacity:0.9;z-index:10000";
    document.body.appendChild(statsFPS.dom);

    var statsMS = new Stats();
    statsMS.showPanel(1); // 1: ms
    statsMS.dom.style.cssText =
      "position:fixed;top:0;left:80px;cursor:pointer;opacity:0.9;z-index:10000";
    document.body.appendChild(statsMS.dom);

    var statsMB;
    if (self.performance && self.performance.memory) {
      statsMB = new Stats();
      statsMB.showPanel(2); // 2: mb
      statsMB.dom.style.cssText =
        "position:fixed;top:0;left:160px;cursor:pointer;opacity:0.9;z-index:10000";
      document.body.appendChild(statsMB.dom);
    }

    function animate() {
      statsFPS.begin();
      statsMS.begin();
      if (statsMB) statsMB.begin();

      statsFPS.end();
      statsMS.end();
      if (statsMB) statsMB.end();

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
